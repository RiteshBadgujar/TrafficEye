{% extends "base.html" %}

{% block title %}Add Violation | TrafficEye{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">
                        <i class="fa-solid fa-circle-plus"></i>
                        Add New Traffic Violation
                    </h3>

                </div>

                <div class="card-body">

                    {% if message %}
                        <div class="alert alert-success">
                            {{ message }}
                        </div>
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Vehicle Number
                                </label>

                                <input
                                    type="text"
                                    name="vehicle_number"
                                    class="form-control"
                                    placeholder="MH15AB1234"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Owner Name
                                </label>

                                <input
                                    type="text"
                                    name="owner_name"
                                    class="form-control"
                                    placeholder="Enter Owner Name"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Violation Type
                                </label>

                                <select
                                    name="violation_type"
                                    class="form-select"
                                    required>

                                    <option value="">
                                        Select Violation
                                    </option>

                                    <option>Helmet</option>

                                    <option>Seat Belt</option>

                                    <option>Overspeed</option>

                                    <option>Signal Jump</option>

                                    <option>Wrong Parking</option>

                                    <option>Drunk Driving</option>

                                    <option>Mobile While Driving</option>

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Location
                                </label>

                                <input
                                    type="text"
                                    name="location"
                                    class="form-control"
                                    placeholder="Enter Location"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Fine Amount (₹)
                                </label>

                                <input
                                    type="number"
                                    name="fine_amount"
                                    class="form-control"
                                    placeholder="500"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Officer Name
                                </label>

                                <input
                                    type="text"
                                    name="officer_name"
                                    class="form-control"
                                    placeholder="Traffic Officer"
                                    required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Date
                                </label>

                                <input
                                    type="date"
                                    name="date"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Time
                                </label>

                                <input
                                    type="time"
                                    name="time"
                                    class="form-control"
                                    required>

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Payment Status
                            </label>

                            <select
                                name="status"
                                class="form-select"
                                required>

                                <option value="Pending">
                                    Pending
                                </option>

                                <option value="Paid">
                                    Paid
                                </option>

                            </select>

                        </div>

                        <div class="text-center">

                            <button
                                type="submit"
                                class="btn btn-primary">

                                <i class="fa-solid fa-floppy-disk"></i>

                                Save Violation

                            </button>

                            <button
                                type="reset"
                                class="btn btn-secondary">

                                <i class="fa-solid fa-rotate"></i>

                                Reset

                            </button>

                            <a
                                href="{% url 'violation_list' %}"
                                class="btn btn-danger">

                                <i class="fa-solid fa-arrow-left"></i>

                                Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

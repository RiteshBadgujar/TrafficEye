{% extends "base.html" %}

{% block content %}

<h2>User Login</h2>

{% if message %}
    <p style="color:red;">
        {{ message }}
    </p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <label>Email</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password</label><br>
    <input type="password" name="password" required><br><br>

    <button type="submit">
        Login
    </button>

</form>

<p>
Don't have an account?
<a href="{% url 'register' %}">Register Here</a>
</p>

{% endblock %}

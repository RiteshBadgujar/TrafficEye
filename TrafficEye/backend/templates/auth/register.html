{% extends "base.html" %}

{% block title %}Register | TrafficEye{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-success text-white text-center">

                    <h3>

                        <i class="fa-solid fa-user-plus"></i>

                        Create Account

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>Name</label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Confirm Password</label>

                            <input
                                type="password"
                                name="confirm_password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            class="btn btn-success w-100">

                            <i class="fa-solid fa-user-plus"></i>

                            Register

                        </button>

                    </form>

                </div>

                <div class="card-footer text-center">

                    Already Registered?

                    <a href="{% url 'login' %}">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
